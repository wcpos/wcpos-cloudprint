services:
  relay:
    image: ghcr.io/wcpos/wcpos-cloudprint:latest
    restart: unless-stopped
    ports:
      - "443:8443"
      - "127.0.0.1:8080:8080" # plain-HTTP /healthz for host monitoring
    volumes:
      - ./certs:/certs:ro
      - ./data:/data
    environment:
      RELAY_LISTEN: ":8443"
      RELAY_HEALTH: ":8080"
      RELAY_CERT: /certs/relay.crt # full chain, leaf first
      RELAY_KEY: /certs/relay.key
      RELAY_SITES: /data/sites.json
      RELAY_PUBLIC_URL: https://cloudprint.wcpos.com
      RELAY_MODE: transparent # flip to adaptive after Phase B ships hints
      RELAY_MASTER_SECRET: ${RELAY_MASTER_SECRET} # from .env on the box, 0600, never committed
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" } # metadata-only logs, bounded retention
