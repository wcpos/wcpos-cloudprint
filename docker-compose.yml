# Coolify deploys this via its Docker Compose build pack: TLS and routing
# are Traefik's job, so there is no ports: mapping and no cert mount. No
# healthcheck either — the distroless image has no shell to exec one.
services:
  relay:
    build: .
    restart: unless-stopped
    environment:
      RELAY_MASTER_SECRET: ${RELAY_MASTER_SECRET}
    volumes:
      - relay-data:/data
    # Bound access-log disk use: 3 × 10 MB rotated files, ~30 MB max on the box.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
volumes:
  relay-data:
